<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🇯🇵 Japan Trip 2026 — Evans Family</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@300;400;600;700&family=DM+Sans:wght@300;400;500;600&display=swap');
/* ── THEME VARIABLES ── */
[data-theme="dark"] {
  --ink:#0f0f1a; --ink2:#1a1a2e; --ink3:#12121f;
  --blossom:#e8829a; --gold:#c9a84c; --jade:#4a9e8e;
  --white:#fdfbf7; --muted:#8888a0; --border:rgba(255,255,255,0.08);
  --card-bg:rgba(255,255,255,0.03); --card-hover:rgba(255,255,255,0.06);
  --item-border:rgba(255,255,255,0.05); --shadow:rgba(0,0,0,0.4);
}
[data-theme="light"] {
  --ink:#f5f3ef; --ink2:#eceae6; --ink3:#e8e4de;
  --blossom:#c0546a; --gold:#9a7030; --jade:#2e7a6c;
  --white:#1a1a2e; --muted:#666680; --border:rgba(0,0,0,0.1);
  --card-bg:rgba(0,0,0,0.03); --card-hover:rgba(0,0,0,0.06);
  --item-border:rgba(0,0,0,0.07); --shadow:rgba(0,0,0,0.15);
}
*{box-sizing:border-box;margin:0;padding:0;}
html{overflow-x:hidden;}
body{font-family:'DM Sans',sans-serif;background:var(--ink);color:var(--white);min-height:100vh;transition:background 0.3s,color 0.3s;overflow-x:hidden;max-width:100vw;}
/* HEADER */
.header{background:linear-gradient(160deg,#0f0f1a 0%,#1a1a2e 50%,#0f1520 100%);padding:24px 20px 16px;text-align:center;border-bottom:1px solid rgba(232,130,154,0.2);position:relative;overflow:hidden;}
[data-theme="light"] .header{background:linear-gradient(160deg,#2a1a2e 0%,#3a1a2e 50%,#2a1520 100%);}
.header::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 50% 0%,rgba(232,130,154,0.08) 0%,transparent 70%);pointer-events:none;}
.header-jp{font-family:'Noto Serif JP',serif;font-size:11px;color:var(--blossom);letter-spacing:6px;margin-bottom:6px;opacity:0.8;}
.header h1{font-family:'Noto Serif JP',serif;font-size:clamp(20px,5vw,28px);font-weight:600;color:#fdfbf7;line-height:1.2;}
.header-dates{font-size:13px;color:var(--gold);margin-top:6px;letter-spacing:1px;font-weight:500;}
.family-row{display:flex;justify-content:center;gap:8px;margin-top:10px;flex-wrap:wrap;align-items:center;}
.family-pill{background:rgba(232,130,154,0.12);border:1px solid rgba(232,130,154,0.25);color:#e8829a;font-size:11px;padding:3px 10px;border-radius:20px;font-weight:500;}
/* THEME TOGGLE */
.theme-toggle{background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.2);color:#fdfbf7;font-size:14px;padding:4px 10px;border-radius:20px;cursor:pointer;font-family:inherit;transition:all 0.2s;margin-left:6px;}
.theme-toggle:hover{background:rgba(255,255,255,0.2);}
.countdown-bar{display:flex;justify-content:center;gap:12px;margin-top:14px;flex-wrap:wrap;}
.countdown-unit{text-align:center;background:rgba(232,130,154,0.08);border:1px solid rgba(232,130,154,0.2);border-radius:12px;padding:8px 14px;min-width:60px;}
.countdown-num{font-family:'Noto Serif JP',serif;font-size:24px;font-weight:700;color:#e8829a;line-height:1;}
.countdown-lbl{font-size:10px;color:var(--muted);margin-top:3px;letter-spacing:0.5px;text-transform:uppercase;}
.countdown-gone{font-size:13px;color:var(--jade);font-weight:600;margin-top:12px;letter-spacing:0.5px;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.3}}
.sync-bar{display:flex;align-items:center;justify-content:center;gap:8px;margin-top:12px;font-size:11px;color:var(--muted);}
.sync-dot{width:6px;height:6px;border-radius:50%;background:var(--jade);flex-shrink:0;}
.sync-dot.loading{background:var(--gold);animation:pulse 1s infinite;}
.sync-dot.error{background:#e05050;}
.refresh-btn{background:none;border:1px solid rgba(255,255,255,0.15);color:var(--muted);font-size:11px;padding:3px 10px;border-radius:12px;cursor:pointer;font-family:inherit;transition:all 0.2s;}
.refresh-btn:hover{border-color:var(--blossom);color:var(--blossom);}
/* TODAY BANNER */
.today-banner{background:linear-gradient(135deg,rgba(74,158,142,0.2),rgba(74,158,142,0.08));border:1px solid rgba(74,158,142,0.4);border-radius:12px;padding:12px 16px;margin:12px 0 4px;display:flex;align-items:center;gap:10px;cursor:pointer;transition:all 0.2s;}
.today-banner:hover{background:rgba(74,158,142,0.25);}
.today-banner-text{font-size:13px;font-weight:600;color:var(--jade);}
.today-banner-sub{font-size:11px;color:var(--muted);margin-top:2px;}
.today-badge{font-size:20px;flex-shrink:0;}
/* TODAY DAY HIGHLIGHT */
.day-card.today-day{border-color:rgba(74,158,142,0.5);box-shadow:0 0 0 1px rgba(74,158,142,0.3),0 4px 20px rgba(74,158,142,0.15);}
.day-card.today-day .day-num{color:var(--jade);}
.today-pill{font-size:9px;font-weight:700;background:rgba(74,158,142,0.2);color:var(--jade);border:1px solid rgba(74,158,142,0.4);padding:2px 7px;border-radius:8px;letter-spacing:0.5px;text-transform:uppercase;margin-left:6px;}
/* NAV */
.nav-tabs{display:flex;background:var(--ink2);border-bottom:1px solid var(--border);overflow-x:auto;scrollbar-width:none;justify-content:flex-start;width:100%;max-width:100vw;}
@media(min-width:700px){.nav-tabs{justify-content:center;}}
.nav-tabs::-webkit-scrollbar{display:none;}
.nav-tab{flex-shrink:0;padding:12px 14px;font-size:11.5px;font-weight:500;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;transition:all 0.2s;white-space:nowrap;font-family:inherit;background:none;border-top:none;border-left:none;border-right:none;}
.nav-tab:hover{color:var(--white);}
.nav-tab.active{color:var(--blossom);border-bottom-color:var(--blossom);}
.content{max-width:760px;margin:0 auto;padding:0 16px 80px;}
.section-title{font-size:11px;color:var(--gold);font-weight:600;letter-spacing:0.5px;text-transform:uppercase;padding:14px 0 8px;}
/* OVERVIEW */
.overview-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;padding:20px 0 8px;}
.stat-card{background:var(--card-bg);border:1px solid var(--border);border-radius:12px;padding:14px 12px;text-align:center;}
.stat-num{font-family:'Noto Serif JP',serif;font-size:26px;font-weight:600;color:var(--blossom);line-height:1;}
.stat-label{font-size:11px;color:var(--muted);margin-top:4px;}
.route-strip{display:flex;align-items:center;gap:8px;padding:14px 16px;margin:12px 0;background:var(--card-bg);border:1px solid var(--border);border-radius:12px;overflow-x:auto;scrollbar-width:none;}
.route-strip::-webkit-scrollbar{display:none;}
.route-city{flex-shrink:0;font-size:12px;font-weight:600;}
.route-arrow{flex-shrink:0;color:var(--blossom);font-size:14px;}
.hotel-card{display:flex;align-items:center;gap:14px;padding:14px 16px;margin-bottom:8px;background:var(--card-bg);border:1px solid var(--border);border-radius:12px;}
.hotel-icon{font-size:22px;flex-shrink:0;}
.hotel-name{font-size:14px;font-weight:500;}
.hotel-dates{font-size:11px;color:var(--muted);margin-top:2px;}
.hotel-status{margin-left:auto;font-size:10px;font-weight:600;padding:3px 9px;border-radius:10px;flex-shrink:0;}
.hotel-status.paid{background:rgba(74,158,142,0.2);color:var(--jade);border:1px solid rgba(74,158,142,0.3);}
.hotel-status.property{background:rgba(201,168,76,0.2);color:var(--gold);border:1px solid rgba(201,168,76,0.3);}
.status-legend{display:flex;flex-wrap:wrap;gap:8px;padding:4px 0 12px;}
.legend-item{display:flex;align-items:center;gap:5px;font-size:10px;color:var(--muted);}
.legend-dot{width:8px;height:8px;border-radius:3px;flex-shrink:0;}
/* DAYS */
.days-container{padding-top:12px;}
.day-card{margin-bottom:8px;border:1px solid var(--border);border-radius:14px;overflow:hidden;background:var(--card-bg);transition:border-color 0.3s,box-shadow 0.3s;}
.day-header{display:flex;align-items:center;gap:12px;padding:14px 16px;cursor:pointer;transition:background 0.2s;user-select:none;}
.day-header:hover{background:var(--card-hover);}
.day-num{font-family:'Noto Serif JP',serif;font-size:22px;font-weight:700;color:var(--blossom);line-height:1;min-width:30px;}
.day-info{flex:1;min-width:0;}
.day-title{font-size:14px;font-weight:600;display:flex;align-items:center;flex-wrap:wrap;gap:4px;}
.day-loc{font-size:11px;color:var(--muted);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.day-badge{font-size:10px;padding:3px 8px;border-radius:10px;font-weight:600;flex-shrink:0;background:rgba(201,168,76,0.15);color:var(--gold);border:1px solid rgba(201,168,76,0.25);}
.day-chevron{color:var(--muted);font-size:14px;transition:transform 0.25s;flex-shrink:0;}
.day-card.open .day-chevron{transform:rotate(90deg);}
.day-body{display:none;padding:0 16px 14px;}
.day-card.open .day-body{display:block;}
/* Day map */
.day-map-btn{display:inline-flex;align-items:center;gap:6px;font-size:11px;color:var(--blossom);background:rgba(232,130,154,0.1);border:1px solid rgba(232,130,154,0.25);border-radius:20px;padding:5px 12px;cursor:pointer;margin:8px 0 4px;font-family:inherit;transition:all 0.2s;}
.day-map-btn:hover{background:rgba(232,130,154,0.2);}
.day-map-btn.active{background:rgba(232,130,154,0.25);}
.day-osm-frame{width:100%;height:260px;border:none;border-radius:12px;border:1px solid var(--border);margin:8px 0;display:none;}
.day-osm-frame.visible{display:block;}
/* ── Day image banner ── */
.day-banner-img{width:100%;aspect-ratio:16/9;object-fit:contain;border-radius:12px;margin:10px 0 6px;display:block;background:var(--ink2);}
/* ── IDEAS section ── */
.ideas-toggle{display:inline-flex;align-items:center;gap:6px;font-size:11px;color:var(--gold);background:rgba(201,168,76,0.1);border:1px solid rgba(201,168,76,0.3);border-radius:20px;padding:5px 12px;cursor:pointer;margin:10px 0 4px;font-family:inherit;transition:all 0.2s;}
.ideas-toggle:hover{background:rgba(201,168,76,0.2);}
.ideas-toggle.open{background:rgba(201,168,76,0.2);}
.ideas-section{display:none;margin-top:4px;border-top:1px solid var(--border);padding-top:10px;}
.ideas-section.visible{display:block;}
.idea-item{padding:9px 12px;margin-bottom:6px;background:rgba(201,168,76,0.06);border:1px solid rgba(201,168,76,0.18);border-radius:10px;}
.idea-title{font-size:12.5px;font-weight:600;color:var(--white);margin-bottom:3px;}
.idea-type{display:inline-block;font-size:10px;color:var(--gold);background:rgba(201,168,76,0.15);border-radius:10px;padding:1px 7px;margin-bottom:4px;}
.idea-notes{font-size:11px;color:var(--muted);line-height:1.5;}
.idea-map{font-size:10.5px;color:var(--blossom);text-decoration:none;display:inline-block;margin-top:4px;opacity:0.8;}
.idea-map:hover{opacity:1;}
.idea-url{font-size:10.5px;color:var(--jade);text-decoration:none;display:inline-block;margin-top:4px;margin-left:8px;opacity:0.8;}
.idea-url:hover{opacity:1;}
/* ── DON'T FORGET section ── */
.dont-forget-section{margin-top:14px;border-top:1px solid rgba(201,168,76,0.2);padding-top:10px;}
.dont-forget-title{font-size:10px;font-weight:700;color:var(--gold);letter-spacing:0.5px;text-transform:uppercase;margin-bottom:8px;display:flex;align-items:center;gap:5px;}
.dont-forget-item{display:flex;align-items:flex-start;gap:10px;padding:7px 10px;margin-bottom:5px;background:rgba(201,168,76,0.05);border:1px solid rgba(201,168,76,0.15);border-radius:8px;}
.dont-forget-icon{font-size:13px;flex-shrink:0;margin-top:1px;}
.dont-forget-main{flex:1;min-width:0;}
.dont-forget-text{font-size:12px;font-weight:500;color:var(--white);line-height:1.4;}
.dont-forget-tag{font-size:9px;font-weight:600;color:var(--gold);background:rgba(201,168,76,0.15);border-radius:6px;padding:1px 6px;margin-right:5px;text-transform:uppercase;letter-spacing:0.3px;}
.dont-forget-notes{font-size:10.5px;color:var(--muted);margin-top:3px;line-height:1.4;}
.dont-forget-link{font-size:10.5px;color:var(--jade);text-decoration:none;display:inline-block;margin-top:4px;opacity:0.8;}
.dont-forget-link:hover{opacity:1;}
/* ── IDEAS PANEL ── */
.ideas-panel{display:none;margin:6px 0 4px;border:1px solid rgba(201,168,76,0.2);border-radius:10px;background:rgba(201,168,76,0.04);overflow:hidden;}
.ideas-panel.open{display:block;}
.ideas-header{font-size:10px;font-weight:600;color:var(--gold);letter-spacing:0.5px;text-transform:uppercase;padding:8px 12px 4px;}
.idea-link{display:inline-flex;align-items:center;gap:4px;font-size:10.5px;color:var(--blossom);text-decoration:none;margin-top:4px;opacity:0.8;}
.idea-link:hover{opacity:1;}
.item-maplink{font-size:11px;color:var(--blossom);text-decoration:none;opacity:0.7;transition:opacity 0.2s;flex-shrink:0;}
.item-maplink:hover{opacity:1;}
.detail-btn{background:rgba(232,130,154,0.12);border:1px solid rgba(232,130,154,0.25);color:var(--blossom);font-size:10px;font-weight:600;padding:2px 8px;border-radius:10px;cursor:pointer;font-family:inherit;transition:all 0.2s;flex-shrink:0;letter-spacing:0.3px;}
.detail-btn:hover{background:rgba(232,130,154,0.25);}
/* ITEMS */
.item{display:grid;grid-template-columns:52px 1fr;gap:10px;padding:10px 0;border-top:1px solid var(--item-border);align-items:start;}
.item-time{font-size:11px;color:var(--muted);font-weight:500;padding-top:2px;text-align:right;line-height:1.3;}
.item-main{min-width:0;}
.item-activity{font-size:13px;font-weight:500;line-height:1.4;}
.item-notes{font-size:11px;color:var(--muted);margin-top:4px;line-height:1.5;}
.item-actions{display:flex;align-items:center;gap:8px;margin-top:6px;}
.item-status-row{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-top:5px;}
.item-info-row{margin-top:6px;}
/* STATUS BADGES */
.status-badge{font-size:9px;font-weight:700;padding:2px 7px;border-radius:8px;letter-spacing:0.5px;margin-top:4px;display:inline-block;text-transform:uppercase;}
.s-booked    {background:rgba(224,80,80,0.2);   color:#e05050; border:1px solid rgba(224,80,80,0.3);}
.s-bookahead {background:rgba(201,130,50,0.2);  color:#e09040; border:1px solid rgba(201,130,50,0.3);}
.s-confirmed {background:rgba(74,158,142,0.2);  color:var(--jade); border:1px solid rgba(74,158,142,0.3);}
.s-included  {background:rgba(74,142,201,0.2);  color:#4a8ec9; border:1px solid rgba(74,142,201,0.3);}
.s-planning  {background:rgba(201,168,76,0.2);  color:var(--gold); border:1px solid rgba(201,168,76,0.3);}
.s-optional  {background:rgba(158,110,201,0.2); color:#9e6ec9; border:1px solid rgba(158,110,201,0.3);}
.s-free      {background:rgba(122,184,122,0.2); color:#7ab87a; border:1px solid rgba(122,184,122,0.3);}
.s-paid      {background:rgba(74,158,142,0.2);  color:var(--jade); border:1px solid rgba(74,158,142,0.3);}
/* MODAL */
.modal-backdrop{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.75);z-index:1000;align-items:flex-end;justify-content:center;}
.modal-backdrop.open{display:flex;}
@media(min-width:500px){.modal-backdrop{align-items:center;}}
.modal-box{background:#1a1a2e;border-radius:20px 20px 0 0;width:100%;max-width:500px;max-height:85vh;overflow-y:auto;padding:22px 20px 40px;border:1px solid rgba(255,255,255,0.1);border-bottom:none;}
[data-theme="light"] .modal-box{background:#f0ecea;}
@media(min-width:500px){.modal-box{border-radius:16px;border:1px solid rgba(255,255,255,0.1);max-height:80vh;}}
.modal-header{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin-bottom:16px;border-bottom:1px solid var(--border);padding-bottom:14px;}
.modal-title{font-size:15px;font-weight:600;line-height:1.4;flex:1;color:var(--white);}
.modal-close{background:rgba(255,255,255,0.08);border:none;color:var(--muted);font-size:16px;cursor:pointer;padding:4px 9px;line-height:1;border-radius:8px;flex-shrink:0;transition:all 0.2s;}
.modal-close:hover{background:rgba(255,255,255,0.18);color:var(--white);}
.modal-body{font-size:13px;color:rgba(255,255,255,0.85);line-height:1.9;white-space:pre-line;}
[data-theme="light"] .modal-body{color:rgba(0,0,0,0.8);}
[data-theme="light"] .modal-title{color:#1a1a2e;}
/* TRANSPORT CARDS */
.transport-card{background:var(--card-bg);border:1px solid var(--border);border-radius:14px;padding:16px;margin-bottom:10px;}
.transport-route{display:flex;align-items:center;gap:8px;margin-bottom:10px;flex-wrap:wrap;}
.transport-from,.transport-to{font-size:14px;font-weight:600;}
.transport-arrow{color:var(--blossom);font-size:16px;flex-shrink:0;}
.transport-type{font-size:10px;font-weight:700;padding:2px 8px;border-radius:8px;background:rgba(74,142,201,0.2);color:#4a8ec9;border:1px solid rgba(74,142,201,0.3);letter-spacing:0.5px;text-transform:uppercase;}
.transport-meta{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:8px;}
.transport-meta-item{font-size:11px;color:var(--muted);}
.transport-meta-item strong{color:var(--white);display:block;font-size:12px;margin-bottom:1px;}
.transport-status{display:inline-flex;align-items:center;gap:6px;font-size:11px;margin-top:8px;padding:4px 10px;border-radius:10px;}
.transport-status.confirmed{background:rgba(74,158,142,0.15);color:var(--jade);}
.transport-status.book{background:rgba(201,130,50,0.15);color:#e09040;}
.transport-note{font-size:11px;color:var(--muted);margin-top:8px;padding-top:8px;border-top:1px solid var(--item-border);line-height:1.5;}
/* LINKS TAB */
.links-group{margin-bottom:20px;}
.links-group-title{font-size:12px;font-weight:600;color:var(--gold);letter-spacing:0.5px;text-transform:uppercase;padding:10px 0 8px;}
.link-card{display:flex;align-items:center;gap:12px;padding:12px 14px;margin-bottom:6px;background:var(--card-bg);border:1px solid var(--border);border-radius:12px;text-decoration:none;transition:all 0.2s;}
.link-card:hover{background:var(--card-hover);border-color:rgba(232,130,154,0.3);}
.link-icon{font-size:20px;flex-shrink:0;}
.link-name{font-size:13px;font-weight:500;color:var(--white);}
.link-desc{font-size:11px;color:var(--muted);margin-top:1px;}
.link-arrow{margin-left:auto;color:var(--blossom);font-size:14px;flex-shrink:0;}
/* CURRENCY */
.currency-widget{background:var(--card-bg);border:1px solid var(--border);border-radius:16px;padding:20px;margin-top:12px;}
.currency-title{font-size:13px;font-weight:600;margin-bottom:16px;color:var(--white);}
.currency-row{display:flex;align-items:center;gap:12px;margin-bottom:12px;}
.currency-input{flex:1;background:var(--ink2);border:1px solid var(--border);color:var(--white);font-size:18px;font-weight:600;padding:10px 14px;border-radius:10px;font-family:inherit;outline:none;transition:border-color 0.2s;-moz-appearance:textfield;}
.currency-input::-webkit-outer-spin-button,.currency-input::-webkit-inner-spin-button{-webkit-appearance:none;}
.currency-input:focus{border-color:var(--blossom);}
.currency-label{font-size:13px;font-weight:600;min-width:28px;color:var(--muted);}
.currency-result{font-size:24px;font-weight:700;color:var(--blossom);font-family:'Noto Serif JP',serif;}
.currency-swap{background:rgba(232,130,154,0.12);border:1px solid rgba(232,130,154,0.25);color:var(--blossom);padding:8px 16px;border-radius:20px;cursor:pointer;font-size:12px;font-weight:600;font-family:inherit;transition:all 0.2s;margin-top:4px;}
.currency-swap:hover{background:rgba(232,130,154,0.25);}
.currency-rate{font-size:11px;color:var(--muted);margin-top:10px;padding-top:10px;border-top:1px solid var(--item-border);}
.quick-amounts{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px;}
.quick-btn{font-size:11px;font-weight:600;padding:5px 12px;background:var(--card-bg);border:1px solid var(--border);color:var(--muted);border-radius:14px;cursor:pointer;font-family:inherit;transition:all 0.2s;}
.quick-btn:hover{border-color:var(--blossom);color:var(--blossom);}
/* EMERGENCY TAB */
.emergency-card{background:var(--card-bg);border:1px solid var(--border);border-radius:14px;padding:16px;margin-bottom:10px;}
.emergency-card.urgent{border-color:rgba(224,80,80,0.4);background:rgba(224,80,80,0.05);}
.emergency-card-title{font-size:12px;font-weight:700;letter-spacing:0.5px;text-transform:uppercase;color:var(--blossom);margin-bottom:10px;display:flex;align-items:center;gap:6px;}
.emergency-card.urgent .emergency-card-title{color:#e05050;}
.emergency-row{display:flex;justify-content:space-between;align-items:flex-start;padding:6px 0;border-top:1px solid var(--item-border);gap:12px;}
.emergency-row:first-of-type{border-top:none;padding-top:0;}
.emergency-label{font-size:11px;color:var(--muted);flex-shrink:0;min-width:100px;}
.emergency-value{font-size:12px;font-weight:500;text-align:right;line-height:1.4;}
.emergency-value a{color:var(--blossom);text-decoration:none;}
.emergency-value a:hover{text-decoration:underline;}
.emergency-number{font-size:16px;font-weight:700;color:var(--jade);}
.emergency-banner{background:rgba(224,80,80,0.1);border:1px solid rgba(224,80,80,0.3);border-radius:12px;padding:12px 16px;margin-bottom:16px;font-size:12px;color:#e05050;line-height:1.5;text-align:center;font-weight:600;}
/* CHECKLIST */
.checklist-container{padding-top:12px;}
.checklist-group{margin-bottom:16px;}
.checklist-group-title{font-size:12px;font-weight:600;color:var(--gold);letter-spacing:0.5px;padding:10px 0 8px;text-transform:uppercase;}
.checklist-item{display:flex;align-items:flex-start;gap:12px;padding:10px 14px;margin-bottom:6px;background:var(--card-bg);border:1px solid var(--border);border-radius:10px;}
.check-task{font-size:13px;font-weight:500;flex:1;}
.check-meta{font-size:11px;color:var(--muted);margin-top:2px;}
.check-who{font-size:10px;padding:2px 8px;border-radius:8px;font-weight:600;flex-shrink:0;margin-top:2px;background:rgba(232,130,154,0.15);color:var(--blossom);border:1px solid rgba(232,130,154,0.25);}
.checklist-notice{background:rgba(232,130,154,0.1);border:1px solid rgba(232,130,154,0.3);border-radius:12px;padding:12px 16px;margin-bottom:18px;font-size:12.5px;color:var(--blossom);line-height:1.5;text-align:center;}
/* MAP */
.map-view-toggle{display:flex;gap:8px;padding:12px 0 8px;}
.map-toggle-btn{padding:6px 16px;font-size:12px;font-weight:500;background:var(--card-bg);border:1px solid var(--border);color:var(--muted);border-radius:20px;cursor:pointer;font-family:inherit;transition:all 0.2s;}
.map-toggle-btn.active{background:rgba(232,130,154,0.15);border-color:rgba(232,130,154,0.4);color:var(--blossom);}
.map-city-tabs{display:flex;gap:8px;overflow-x:auto;scrollbar-width:none;padding:4px 0 10px;}
.map-city-tabs::-webkit-scrollbar{display:none;}
.map-city-btn{flex-shrink:0;padding:6px 14px;font-size:12px;font-weight:500;background:var(--card-bg);border:1px solid var(--border);color:var(--muted);border-radius:20px;cursor:pointer;font-family:inherit;transition:all 0.2s;white-space:nowrap;}
.map-city-btn:hover{color:var(--white);}
.map-city-btn.active{background:rgba(232,130,154,0.15);border-color:rgba(232,130,154,0.4);color:var(--blossom);}
.osm-frame{width:100%;height:420px;border:none;border-radius:14px;border:1px solid var(--border);display:block;}
.route-svg-wrap{border-radius:14px;overflow:hidden;border:1px solid var(--border);}
/* PHRASES */
.phrase-card{display:flex;align-items:center;gap:14px;padding:12px 16px;margin-bottom:8px;background:var(--card-bg);border:1px solid var(--border);border-radius:12px;}
.phrase-jp{font-family:'Noto Serif JP',serif;font-size:18px;min-width:110px;}
.phrase-en{font-size:13px;font-weight:500;}
.phrase-rom{font-size:11px;color:var(--blossom);margin-top:2px;font-style:italic;}
/* WEATHER */
.weather-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;padding-top:4px;}
@media(min-width:500px){.weather-grid{grid-template-columns:repeat(3,1fr);}}
.weather-card{background:var(--card-bg);border:1px solid var(--border);border-radius:14px;padding:16px 14px;text-align:center;}
.weather-city{font-size:13px;font-weight:600;margin-bottom:4px;}
.weather-dates{font-size:10px;color:var(--muted);margin-bottom:10px;}
.weather-icon{font-size:32px;margin-bottom:6px;}
.weather-temp{font-family:'Noto Serif JP',serif;font-size:22px;font-weight:600;color:var(--blossom);}
.weather-range{font-size:11px;color:var(--muted);margin-top:2px;}
.weather-desc{font-size:11px;color:var(--gold);margin-top:6px;font-weight:500;}
.weather-detail{font-size:10px;color:var(--muted);margin-top:8px;line-height:1.6;}
/* TIPS */
.tip-section{margin-bottom:20px;}
.tip-section-title{font-size:12px;font-weight:600;color:var(--gold);letter-spacing:0.5px;text-transform:uppercase;padding:10px 0 8px;}
.tip-item{padding:10px 14px;margin-bottom:6px;background:var(--card-bg);border:1px solid var(--border);border-radius:10px;font-size:13px;line-height:1.5;}
.tip-item strong{color:var(--blossom);}
</style>
</head>
<body>

<script>
/* ═══════════════════════════════════════════
   CONFIG & STATE
═══════════════════════════════════════════ */
const RAW_URL='https://raw.githubusercontent.com/digitalandyuk/Japan-Trip0326/main/japan-trip.json';
const TRIP_START=new Date('2026-04-03');
const TRIP_END  =new Date('2026-04-18');
const DAY_DATES=[
  {di:0, date:'2026-04-03'},{di:1, date:'2026-04-04'},{di:2, date:'2026-04-05'},
  {di:3, date:'2026-04-06'},{di:4, date:'2026-04-07'},{di:5, date:'2026-04-08'},
  {di:6, date:'2026-04-09'},{di:7, date:'2026-04-10'},{di:8, date:'2026-04-11'},
  {di:9, date:'2026-04-12'},{di:10,date:'2026-04-13'},{di:11,date:'2026-04-14'},
  {di:12,date:'2026-04-15'},{di:13,date:'2026-04-16'},{di:14,date:'2026-04-17'},
  {di:15,date:'2026-04-18'},
];
let tripData=null;
let currencyMode='yenToGbp';
let YEN_RATE=190;
let YEN_RATE_LIVE=false;
let YEN_RATE_TIME='';
async function fetchLiveRate(){
  try{
    const r=await fetch('https://api.frankfurter.app/latest?from=GBP&to=JPY');
    if(!r.ok) throw new Error(r.status);
    const d=await r.json();
    if(d.rates&&d.rates.JPY){
      YEN_RATE=Math.round(d.rates.JPY);
      YEN_RATE_LIVE=true;
      YEN_RATE_TIME=d.date||'';
      updateRateLabels();
      ovConvert();
      if(typeof convertCurrency==='function') convertCurrency();
    }
  }catch(e){console.warn('Currency fetch failed, using fallback ¥'+YEN_RATE,e);}
}
function updateRateLabels(){
  const tag=YEN_RATE_LIVE?`Live rate: ¥${YEN_RATE} = £1 (ECB ${YEN_RATE_TIME})`:`Fallback rate: ¥${YEN_RATE} = £1`;
  document.querySelectorAll('.currency-rate-live').forEach(el=>{el.textContent=tag;});
}
fetchLiveRate();

/* ── Don't Forget classification ── */
const DONT_FORGET_TYPES=['admin','prep','packing','tech','practical','note'];
function isDontForget(idea){
  const t=(idea.type||'').toLowerCase();
  return DONT_FORGET_TYPES.some(dt=>t.includes(dt));
}

/* ═══════════════════════════════════════════
   THEME
═══════════════════════════════════════════ */
function toggleTheme(){
  const html=document.documentElement;
  const isDark=html.getAttribute('data-theme')==='dark';
  html.setAttribute('data-theme',isDark?'light':'dark');
  document.getElementById('theme-btn').textContent=isDark?'🌙 Dark':'☀️ Light';
}
/* ═══════════════════════════════════════════
   STATUS
═══════════════════════════════════════════ */
const STATUS_MAP={
  booked:{cls:'s-booked',label:'Booked'},bookahead:{cls:'s-bookahead',label:'Book Ahead'},
  book_ahead:{cls:'s-bookahead',label:'Book Ahead'},confirmed:{cls:'s-confirmed',label:'Confirmed'},
  included:{cls:'s-included',label:'Included'},planning:{cls:'s-planning',label:'Planning'},
  optional:{cls:'s-optional',label:'Optional'},free:{cls:'s-free',label:'Free'},
  paid:{cls:'s-paid',label:'Paid'},on_arrival:{cls:'s-planning',label:'On Arrival'},
  pay_at_property:{cls:'s-planning',label:'Pay on Arrival'},not_booked:{cls:'s-bookahead',label:'Book Ahead'},
  pending:{cls:'s-bookahead',label:'Book Ahead'},reminder:{cls:'s-optional',label:'Reminder'},
  incomplete:{cls:'s-bookahead',label:'Incomplete'},
};
function resolveStatus(item){
  const s=(item.status||'').toLowerCase();
  if(s==='booked'){
    const n=item.notes||'';
    const hasRef=(
      n.toLowerCase().includes('ref #')||n.toLowerCase().includes('ref#')||
      /booking[:\s]/i.test(n)||n.toLowerCase().includes('confirmed booking')||
      n.toLowerCase().includes('klook')||n.toLowerCase().includes('expedia')||
      /\u00a3\d/.test(n)||/\u00a5[\d,]+(paid|total)/i.test(n)||
      n.toLowerCase().includes('booked via')||n.toLowerCase().includes('pre-booked')||
      n.toLowerCase().includes('emot')||n.toLowerCase().includes('odakyu')||
      /order\s*#?\s*\d+/i.test(n)||/\u00a5[\d,]+\s*(paid|total)/i.test(n)
    );
    if(!hasRef) return{cls:'s-bookahead',label:'Book Ahead'};
  }
  return STATUS_MAP[s]||{cls:'s-planning',label:item.status||''};
}
/* ═══════════════════════════════════════════
   COUNTDOWN
═══════════════════════════════════════════ */
function renderCountdown(){
  const dep=new Date('2026-04-03T00:00:00'),now=new Date(),diff=dep-now;
  const bar=document.getElementById('countdown-bar');
  if(!bar) return;
  if(diff<=0){
    const end=new Date('2026-04-18T23:59:59');
    if(now<=end) bar.innerHTML='<div class="countdown-gone">✈️ Trip is underway — enjoy Japan! 🌸</div>';
    else bar.innerHTML='<div class="countdown-gone">🏡 Back home — what a trip!</div>';
    return;
  }
  const d=Math.floor(diff/86400000),h=Math.floor((diff%86400000)/3600000),
        m=Math.floor((diff%3600000)/60000),s=Math.floor((diff%60000)/1000);
  bar.innerHTML=`
    <div class="countdown-unit"><div class="countdown-num">${d}</div><div class="countdown-lbl">Days</div></div>
    <div class="countdown-unit"><div class="countdown-num">${String(h).padStart(2,'0')}</div><div class="countdown-lbl">Hours</div></div>
    <div class="countdown-unit"><div class="countdown-num">${String(m).padStart(2,'0')}</div><div class="countdown-lbl">Mins</div></div>
    <div class="countdown-unit"><div class="countdown-num">${String(s).padStart(2,'0')}</div><div class="countdown-lbl">Secs</div></div>`;
}
renderCountdown();
setInterval(renderCountdown,1000);
/* ═══════════════════════════════════════════
   TODAY DETECTION
═══════════════════════════════════════════ */
function getTodayIndex(){
  const now=new Date();
  const todayISO=now.toISOString().slice(0,10);
  const match=DAY_DATES.find(d=>d.date===todayISO);
  return match?match.di:-1;
}
function renderTodayBanner(){
  const idx=getTodayIndex();
  if(idx<0) return '';
  const days=(tripData&&tripData.days)||[];
  const day=days[idx];
  if(!day) return '';
  return `<div class="today-banner" onclick="goToToday()">
    <div class="today-badge">📅</div>
    <div>
      <div class="today-banner-text">Today: ${day.title||day.day||'Day '+idx}</div>
      <div class="today-banner-sub">${day.date||''} · Tap to jump to today's day →</div>
    </div>
  </div>`;
}
function goToToday(){
  const idx=getTodayIndex();
  if(idx<0) return;
  switchTab('days',document.querySelector('.nav-tab:nth-child(2)'));
  setTimeout(()=>{
    const card=document.getElementById('day-'+idx);
    if(!card) return;
    if(!card.classList.contains('open')) card.classList.add('open');
    card.scrollIntoView({behavior:'smooth',block:'start'});
  },100);
}
/* ═══════════════════════════════════════════
   DATA LOAD
═══════════════════════════════════════════ */
function setSyncStatus(state,msg){
  const dot=document.getElementById('sync-dot');
  const txt=document.getElementById('sync-status');
  if(dot) dot.className='sync-dot'+(state==='loading'?' loading':state==='error'?' error':'');
  if(txt) txt.textContent=msg;
}
async function loadData(){
  setSyncStatus('loading','Fetching latest data…');
  try{
    const res=await fetch(RAW_URL+'?t='+Date.now());
    if(!res.ok) throw new Error('HTTP '+res.status);
    tripData=await res.json();
    setSyncStatus('ok','Updated '+new Date().toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'}));
  }catch(e){
    setSyncStatus('error','Could not fetch — showing cached/fallback');
    tripData={days:[],checklist:[]};
  }
  renderOverview();
  renderDays();
  renderChecklist();
  updateRateLabels();
}
/* ═══════════════════════════════════════════
   OVERVIEW
═══════════════════════════════════════════ */
function renderOverview(){
  const days=(tripData&&tripData.days)||[];
  const totalItems=days.reduce((a,d)=>a+(d.items||[]).length,0);
  const hotels=[
    {name:'Crown Park Hotel Seoul',       dates:'Sat 4 – Sun 5 Apr',   status:'paid',    url:'https://www.expedia.co.uk/trips/72068508725700'},
    {name:'Keio Plaza Hotel Tokyo',        dates:'Sun 5 – Wed 8 Apr',   status:'property',url:'https://www.expedia.co.uk/trips/73304498303010'},
    {name:'TEN-YU Ryokan, Hakone',         dates:'Wed 8 – Fri 10 Apr',  status:'paid',    url:'https://www.expedia.co.uk/trips/73304509243260'},
    {name:'Mitsui Garden Hotel Kyoto',     dates:'Fri 10 – Tue 14 Apr', status:'paid',    url:'https://www.expedia.co.uk/trips/72068513747786'},
    {name:'Candeo Hotels Osaka The Tower', dates:'Tue 14 – Fri 17 Apr', status:'paid',    url:'https://www.expedia.co.uk/trips/72068515678580'},
    {name:'Grand Hyatt Incheon',           dates:'Fri 17 – Sat 18 Apr', status:'property',url:'https://www.expedia.co.uk/trips/72068509828739'},
  ];
  const icons=['🏨','🏙️','🛁','🌸','🎡','✈️'];
  document.getElementById('tab-overview').innerHTML=`
    ${renderTodayBanner()}
    <div class="overview-grid">
      <div class="stat-card"><div class="stat-num">15</div><div class="stat-label">Days</div></div>
      <div class="stat-card"><div class="stat-num">5</div><div class="stat-label">Cities</div></div>
      <div class="stat-card"><div class="stat-num">${totalItems||'60+'}</div><div class="stat-label">Activities</div></div>
    </div>
    <div class="section-title">¥ / £ Quick Converter</div>
    <div class="currency-widget" style="margin-bottom:16px;">
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:10px;flex-wrap:wrap;">
        <input class="currency-input" type="number" id="ov-currency-input" value="1000" oninput="ovConvert()" min="0" style="max-width:130px;">
        <span class="currency-label" id="ov-from-label">¥</span>
        <span style="font-size:18px;color:var(--muted)">→</span>
        <span class="currency-result" id="ov-result">£5.26</span>
        <span class="currency-label" id="ov-to-label">£</span>
        <button class="currency-swap" style="margin-top:0;" onclick="ovSwap()">⇄</button>
      </div>
      <div class="quick-amounts" id="ov-quick">
        <span style="font-size:11px;color:var(--muted);align-self:center;">Quick:</span>
        <button class="quick-btn" onclick="ovSet(500)">¥500</button>
        <button class="quick-btn" onclick="ovSet(1000)">¥1,000</button>
        <button class="quick-btn" onclick="ovSet(5000)">¥5,000</button>
        <button class="quick-btn" onclick="ovSet(10000)">¥10,000</button>
        <button class="quick-btn" onclick="ovSet(50000)">¥50,000</button>
      </div>
      <div class="currency-rate currency-rate-live">Loading live rate…</div>
    </div>
    <div class="section-title">Accommodation</div>
    ${hotels.map((h,i)=>`<a class="hotel-card" href="${h.url}" target="_blank" rel="noopener" style="text-decoration:none;color:inherit;cursor:pointer;">
      <div class="hotel-icon">${icons[i]}</div>
      <div><div class="hotel-name">${h.name}</div><div class="hotel-dates">${h.dates}</div></div>
      <div class="hotel-status ${h.status==='paid'?'paid':'property'}">${h.status==='paid'?'Paid':'Pay on Arrival'}</div>
    </a>`).join('')}
    <div class="section-title" style="margin-top:20px;">Status Key</div>
    <div class="status-legend">
      <div class="legend-item"><div class="legend-dot" style="background:#e05050"></div>Booked & confirmed</div>
      <div class="legend-item"><div class="legend-dot" style="background:#e09040"></div>Book ahead</div>
      <div class="legend-item"><div class="legend-dot" style="background:#4a9e8e"></div>Confirmed / Paid</div>
      <div class="legend-item"><div class="legend-dot" style="background:#4a8ec9"></div>Included</div>
      <div class="legend-item"><div class="legend-dot" style="background:#c9a84c"></div>Planning</div>
      <div class="legend-item"><div class="legend-dot" style="background:#9e6ec9"></div>Optional</div>
      <div class="legend-item"><div class="legend-dot" style="background:#7ab87a"></div>Free</div>
    </div>`;
  setTimeout(ovConvert,50);
}
/* ═══════════════════════════════════════════
   DAYS TAB
═══════════════════════════════════════════ */
const DAY_OSM={
  'Seoul':  'https://www.openstreetmap.org/export/embed.html?bbox=126.734%2C37.413%2C127.183%2C37.701&layer=mapnik&marker=37.5665%2C126.9780',

  'Kyoto':  'https://www.openstreetmap.org/export/embed.html?bbox=135.630%2C34.930%2C135.870%2C35.090&layer=mapnik&marker=35.0116%2C135.7681',
  'Nara':   'https://www.openstreetmap.org/export/embed.html?bbox=135.760%2C34.650%2C135.860%2C34.720&layer=mapnik&marker=34.6851%2C135.8050',

function formatDayDate(ds){
  if(!ds) return'';
  if(/^\d{4}-\d{2}-\d{2}$/.test(ds)){

}

function buildDontForgetHTML(day,di){
  const reminders=(day.ideas||[]).filter(isDontForget);
  if(!reminders.length) return '';
  const typeIcon={admin:'📋',prep:'🎒',packing:'🧳',tech:'📱',practical:'💡',note:'📌'};
  const rows=reminders.map(idea=>{
    const tKey=Object.keys(typeIcon).find(k=>(idea.type||'').toLowerCase().includes(k))||'note';
    const icon=typeIcon[tKey];
    const linkHtml=idea.url?`<a class="dont-forget-link" href="${idea.url}" target="_blank">🔗 Link</a>`:'';
    return `<div class="dont-forget-item">

  }).join('');

/* ── Ideas section (activities, restaurants, tips only) ── */
function buildIdeasHTML(day,di){
  const ideas=(day.ideas||[]).filter(idea=>!isDontForget(idea));

      ?`<a class="idea-map" href="https://maps.google.com/?q=${encodeURIComponent(idea.mapQuery)}" target="_blank">📍 Map</a>`:'';

/* ── Activity emoji prefix ── */
function activityEmoji(a){
  const t=(a||'').toLowerCase();
  // Flights
  if(/\b(depart|arrive|check.?in.*asiana|check.?in.*virgin|VS\d|OZ\d|flight|icn|lhr|kix|nrt)/i.test(a)) return '✈️ ';
  // Taxi / private transfer
  if(/tourmaker|taxi|private transfer|alphard/i.test(a)) return '🚕 ';
  // Parking
  if(/kwikpark|parking/i.test(a)) return '🅿️ ';
  // Shinkansen
  if(/shinkansen|hikari|nozomi|kodama/i.test(a)) return '🚅 ';
  // Train (romancecar, tozan, JR, haruka, metro, subway)
  if(/romancecar|tozan|haruka|\bJR\b|metro|subway|train|odakyu|gora.*hakone|hakone.*gora/i.test(a)) return '🚃 ';
  // Bus
  if(/\bbus\b/i.test(a)) return '🚌 ';
  // Cable car / ropeway
  if(/cable.?car|ropeway/i.test(a)) return '🚡 ';
  // Boat / river cruise
  if(/boat|cruise|pirate ship|hozugawa|ferry/i.test(a)) return '⛴ ';
  // Hotel check-in / check-out
  if(/check.?in|check.?out/i.test(a)) return '🏨 ';
  // Onsen / rotenburo / bath
  if(/onsen|rotenburo|bath|soak/i.test(a)) return '🛁 ';
  // Temples & shrines
  if(/temple|shrine|kinkaku|ryoan|fushimi|senso|meiji|toshogu|kaburenjo/i.test(a)) return '⛩️ ';
  // Castle
  if(/castle|himeji/i.test(a)) return '🏯 ';
  // Cultural show / sumo / miyako odori / tea ceremony
  if(/sumo|odori|geiko|maiko|tea ceremony|kabuki/i.test(a)) return '🎭 ';
  // Cherry blossom / garden / park
  if(/gyoen|garden|park|blossom|hanami/i.test(a)) return '🌸 ';
  // Walking tour
  if(/walking tour|backstreets/i.test(a)) return '🚶 ';
  // Deer / Nara
  if(/deer|nara park/i.test(a)) return '🦌 ';
  // Shopping / arcade / market
  if(/market|nishiki|ameyoko|arcade|teramachi|shinkyogoku|shopping|duty free/i.test(a)) return '🛍️ ';
  // Food / restaurant / breakfast / lunch / dinner
  if(/breakfast|lunch|dinner|food|ramen|tonkatsu|ekiben|restaurant|izakaya|kaiseki|yakiniku/i.test(a)) return '🍜 ';
  // Sightseeing / explore / wander / walk
  if(/wander|explore|stroll|walk|bamboo|canal|river walk|scramble|shibuya|golden gai|dotonbori/i.test(a)) return '📸 ';
  // Immigration / baggage
  if(/immigration|baggage|customs/i.test(a)) return '🛂 ';
  // Pack / luggage
  if(/\bpack\b|luggage/i.test(a)) return '🧳 ';
  // Freepass / ticket collection
  if(/freepass|activate|collect ticket/i.test(a)) return '🎫 ';
  return '';
}

  const on=dayMapOpen[di];

function openDetailByIndex(i){

function linkifyText(text){
  // Escape HTML entities
  let s=text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  // Preserve line breaks
  s=s.replace(/\n/g,'<br>');
  // Linkify URLs (http/https)
  s=s.replace(/(https?:\/\/[^\s<"]+)/g,'<a href="$1" target="_blank" rel="noopener" style="color:var(--jade);word-break:break-all;">$1</a>');
  // Linkify international phone numbers e.g. +81-75-1234-5678, +44 1234 567890
  s=s.replace(/(\+\d{1,3}[\s\-\.]?\(?\d{1,4}\)?[\s\-\.]?\d{2,4}[\s\-\.]?\d{2,4}[\s\-\.]?\d{0,4})/g,function(m){
    const digits=m.replace(/\D/g,'');
    if(digits.length>=10) return '<a href="tel:+'+digits+'" style="color:var(--gold);">'+m+'</a>';
    return m;
  });
  // Linkify local Japanese phone numbers e.g. 075-123-4567, 0120-123-456
  s=s.replace(/\b(0\d{1,4}[\-\s]\d{2,4}[\-\s]\d{3,4})\b/g,'<a href="tel:$1" style="color:var(--gold);">$1</a>');
  return s;
}
function openDetailModal(title,detail){
  document.getElementById('modal-title').textContent=title;
  document.getElementById('modal-body').innerHTML=linkifyText(detail);
  document.getElementById('detail-modal').classList.add('open');
  document.body.style.overflow='hidden';
}
function closeDetailModal(e){
  if(e&&e.target!==document.getElementById('detail-modal')) return;
  document.getElementById('detail-modal').classList.remove('open');
  document.body.style.overflow='';
}

];
const WMO_ICON={0:'☀️',1:'🌤',2:'⛅',3:'☁️',45:'🌫',48:'🌫',51:'🌦',53:'🌧',55:'🌧',56:'🌧',57:'🌧',61:'🌧',63:'🌧',65:'🌧',66:'🌧',67:'🌧',71:'🌨',73:'🌨',75:'🌨',77:'🌨',80:'🌦',81:'🌧',82:'⛈',85:'🌨',86:'🌨',95:'⛈',96:'⛈',99:'⛈'};
const WMO_DESC={0:'Clear sky',1:'Mainly clear',2:'Partly cloudy',3:'Overcast',45:'Fog',48:'Rime fog',51:'Light drizzle',53:'Drizzle',55:'Heavy drizzle',61:'Light rain',63:'Rain',65:'Heavy rain',71:'Light snow',73:'Snow',75:'Heavy snow',80:'Light showers',81:'Showers',82:'Heavy showers',95:'Thunderstorm',96:'Thunderstorm + hail',99:'Severe thunderstorm'};

async function fetchWeatherForCity(c){
  const url=`https://api.open-meteo.com/v1/forecast?latitude=${c.lat}&longitude=${c.lon}&daily=temperature_2m_max,temperature_2m_min,precipitation_sum,weathercode,wind_speed_10m_max&timezone=auto&start_date=${c.startDay}&end_date=${c.endDay}`;
  try{
    const res=await fetch(url);
    if(!res.ok) throw new Error('HTTP '+res.status);
    const j=await res.json();
    const d=j.daily;
    if(!d||!d.time||!d.time.length) return null;
    const maxT=Math.round(Math.max(...d.temperature_2m_max));
    const minT=Math.round(Math.min(...d.temperature_2m_min));
    const avgT=Math.round(d.temperature_2m_max.reduce((a,v,i)=>(a+v+d.temperature_2m_min[i]),0)/(d.time.length*2));
    const totalRain=d.precipitation_sum.reduce((a,v)=>a+v,0).toFixed(1);
    const maxWind=Math.round(Math.max(...d.wind_speed_10m_max));
    // Use the most common weather code
    const codeCounts={};
    d.weathercode.forEach(wc=>{codeCounts[wc]=(codeCounts[wc]||0)+1;});
    const dominantCode=+Object.entries(codeCounts).sort((a,b)=>b[1]-a[1])[0][0];
    return {avgT,minT,maxT,totalRain,maxWind,code:dominantCode,days:d.time.length,
      dailyData:d.time.map((t,i)=>({date:t,max:Math.round(d.temperature_2m_max[i]),min:Math.round(d.temperature_2m_min[i]),rain:d.precipitation_sum[i],code:d.weathercode[i],wind:Math.round(d.wind_speed_10m_max[i])}))
    };
  }catch(e){return null;}
}

function renderWeatherCard(c,w){
  if(!w) return `<div class="weather-card">
    <div class="weather-city">${c.flag} ${c.city}</div>
    <div class="weather-dates">${c.dates}</div>
    <div class="weather-icon">⏳</div>
    <div class="weather-temp">--</div>
    <div class="weather-desc">Forecast not yet available</div>
    <div class="weather-detail">Forecasts appear ~14 days before travel</div>
  </div>`;
  const icon=WMO_ICON[w.code]||'🌤';
  const desc=WMO_DESC[w.code]||'';
  const dailyRows=w.dailyData.map(d=>{
    const dayName=new Date(d.date+'T12:00:00').toLocaleDateString('en-GB',{weekday:'short',day:'numeric'});
    return `${WMO_ICON[d.code]||'🌤'} ${dayName}: ${d.min}–${d.max}°C${d.rain>0?' · '+d.rain+'mm':''}`;
  }).join('<br>');
  return `<div class="weather-card">
    <div class="weather-city">${c.flag} ${c.city}</div>
    <div class="weather-dates">${c.dates}</div>
    <div class="weather-icon">${icon}</div>
    <div class="weather-temp">${w.avgT}°C</div>
    <div class="weather-range">${w.minT}–${w.maxT}°C</div>
    <div class="weather-desc">${desc}</div>
    <div class="weather-detail">${dailyRows}<br>💨 Wind up to ${w.maxWind} km/h<br>💧 Total rain: ${w.totalRain}mm</div>
  </div>`;
}

function renderBooked(){
  if(!tripData){
    document.getElementById('tab-booked').innerHTML='<p style="color:var(--muted);padding:16px;">Loading\u2026</p>';
    return;
  }
  const doneGroup=(tripData.checklist||[]).find(g=>g.group&&g.group.includes('DONE'));
  const raw=(doneGroup&&doneGroup.items)||[];
  const items=[...raw].sort((a,b)=>{
    const da=a.sortDate||'9999';
    const db=b.sortDate||'9999';
    return da<db?-1:da>db?1:0;
  });
  const LINKS={
    'VS208':'https://www.virginatlantic.com/','VS209':'https://www.virginatlantic.com/',
    'OZ106':'https://flyasiana.com/','OZ113':'https://flyasiana.com/',
    'Tourmaker':'https://www.tourmaker.co.kr/',
    'Klook bus':'https://www.klook.com/en-GB/account/booking',
    'Hakone Freepass':'https://www.emot.jp/emot_online_tickets_faq_en.html',
    'Romancecar':'https://www.emot.jp/emot_online_tickets_faq_en.html',
    'Shinkansen':'https://www.westjr.co.jp/travel-information/en/tickets-passes/',
    'KwikPark':'https://www.looking4.com/uk/manage-booking',
    'TEN-YU':'https://www.expedia.co.uk/trips/71508849581060',
    'Keio Plaza':'https://www.expedia.co.uk/trips/73304498303010',
    'Mitsui Garden':'https://www.expedia.co.uk/trips/20251124078897910',
    'Candeo':'https://www.expedia.co.uk/trips/20251124078913429',
    'Crown Park':'https://www.expedia.co.uk/trips/25301968',
    'Grand Hyatt':'https://www.expedia.co.uk/trips/150513RA052227',
    'Sagano Romantic':'https://sagano-kanko.uniproduct.net/en/',
    'Hozugawa':'https://www.klook.com/en-GB/account/booking',
    'Miyako Odori':'https://s2.e-get.jp/m_odori/pt/',
    'Sumo':'https://www.sumoexperience.com/',
    'Osaka Deep':'https://www.getyourguide.com/account/bookings',
    'Kintetsu Vistacar':'https://www.ticket.kintetsu.co.jp/vs/en/T/TZZ/TZZ10.do?op=tDisplayVisitorMenu#vs-ticketinfo',
  };
  const STATUS_COLOUR={'paid':'var(--blossom)','pay_at_property':'#e09040','confirmed':'var(--jade)'};
  const STATUS_LABEL={'paid':'Paid \u2714','pay_at_property':'Pay on arrival','confirmed':'Confirmed \u2714'};
  function getLink(task){for(const[k,v] of Object.entries(LINKS)){if(task.includes(k))return v;}return null;}
  let lastDate='';
  const cards=items.map((item,i)=>{
    const status=item.status||'paid';
    const badgeColour=STATUS_COLOUR[status]||'var(--jade)';
    const badgeLabel=STATUS_LABEL[status]||status;
    const link=getLink(item.task||'');
    const linkHtml=link?`<a href="${link}" target="_blank" rel="noopener" style="font-size:11px;color:var(--jade);text-decoration:none;margin-top:7px;display:inline-block;">\uD83D\uDD17 View booking</a>`:'';
    const dateLabel=item.dateLabel||item.sortDate||'';
    const isNewDate=dateLabel!==lastDate;
    if(isNewDate) lastDate=dateLabel;
    const dateSep=isNewDate?`<div style="font-size:10px;font-weight:700;color:var(--gold);letter-spacing:0.05em;text-transform:uppercase;padding:${i===0?'4px':'16px'} 0 6px;">${dateLabel}</div>`:'';
    const detailId='bk-detail-'+i;
    const detailLines=(item.notes||'').split('\xb7').map(s=>s.trim()).filter(Boolean);
    const detailHtml=item.notes?`
      <div id="${detailId}" style="display:none;margin-top:10px;background:var(--ink);border-radius:8px;padding:10px 12px;font-size:11.5px;color:var(--muted);line-height:1.7;">
        ${detailLines.map(l=>`<div>\xb7 ${l}</div>`).join('')}
        ${linkHtml}
      </div>`:'';
    const infoBtn=item.notes?`<button onclick="(function(id){const el=document.getElementById(id);el.style.display=el.style.display==='none'?'block':'none';}('${detailId}'))" style="margin-left:8px;font-size:10px;padding:2px 8px;border-radius:10px;border:1px solid var(--jade);color:var(--jade);background:none;cursor:pointer;vertical-align:middle;">\u2139 details</button>`:'';
    return `${dateSep}<div style="background:var(--ink2);border:1px solid var(--border);border-radius:10px;padding:12px 14px;margin-bottom:8px;">
      <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:8px;">
        <div style="font-size:13px;font-weight:600;color:var(--white);line-height:1.4;">${item.task||''}${infoBtn}</div>
        <span style="flex-shrink:0;font-size:10px;padding:3px 8px;border-radius:10px;background:${badgeColour};color:var(--ink);font-weight:700;">${badgeLabel}</span>
      </div>
      ${detailHtml}
    </div>`;
  }).join('');
  document.getElementById('tab-booked').innerHTML=`<div style="padding:12px 0;">
    <p style="font-size:11px;color:var(--muted);padding:0 0 6px;">${items.length} confirmed bookings \u2014 sorted by travel date</p>
    ${cards}
  </div>`;
}

function renderSearch(){
  document.getElementById('tab-search').innerHTML=`
    <div style="padding:12px 0 6px;">
      <div class="section-title">🔍 Search the trip</div>
      <input id="search-input" type="search" placeholder="Search activities, bookings, notes…"
        oninput="runSearch(this.value)"
        style="width:100%;box-sizing:border-box;padding:10px 14px;border-radius:12px;border:1px solid var(--border);
               background:var(--ink2);color:var(--white);font-size:14px;margin-bottom:12px;outline:none;">
      <div id="search-results" style="font-size:12px;color:var(--muted);padding:4px 0;">Start typing to search…</div>
    </div>`;
  setTimeout(()=>{const el=document.getElementById('search-input');if(el)el.focus();},100);
}
function runSearch(q){
  const out=document.getElementById('search-results');
  if(!q||q.trim().length<2){out.innerHTML='<span style="color:var(--muted)">Start typing to search…</span>';return;}
  const term=q.trim().toLowerCase();
  const hits=[];
  // Search itinerary days
  const days=(tripData&&tripData.days)||[];
  days.forEach((day,di)=>{
    (day.items||[]).forEach(item=>{
      const hay=[item.activity,item.notes,item.detail,item.time].filter(Boolean).join(' ').toLowerCase();
      if(hay.includes(term)){
        hits.push({
          label:`<strong>${day.label||'Day '+(di+1)}</strong> · ${day.title||day.location||''}`,
          text:`${item.time?'<span style="color:var(--muted)">'+item.time+'</span> ':''}${item.activity||''}${item.notes?'<br><span style="color:var(--muted);font-size:11px;">'+item.notes+'</span>':''}`,
          action:`switchTab('days',document.querySelectorAll('.nav-tab')[1]);setTimeout(()=>{document.querySelectorAll('.day-card.open').forEach(c=>c.classList.remove('open'));const c=document.getElementById('day-${di}');if(c){c.classList.add('open');c.scrollIntoView({behavior:'smooth',block:'start'});}},100);`,
          tag:'itinerary'
        });
      }
    });
    // Search ideas / don't-forget
    (day.ideas||[]).forEach(idea=>{
      const hay=(typeof idea==='string'?idea:(idea.text||'')).toLowerCase();
      if(hay.includes(term)) hits.push({label:`<strong>${day.label||'Day '+(di+1)}</strong> · Ideas`,text:typeof idea==='string'?idea:(idea.text||''),action:'',tag:'idea'});
    });
  });
  // Search checklist (array of {group, items})
  const cl=(tripData&&tripData.checklist)||[];
  cl.forEach(function(grp){
    const group=grp.group||'';
    const isBooked=group.includes('DONE');
    (grp.items||[]).forEach(function(item){
      const hay=[item.task,item.notes,item.who,item.deadline].filter(Boolean).join(' ').toLowerCase();
      if(hay.includes(term)){
        if(isBooked){
          hits.push({label:`<strong>Booked</strong>`,text:item.task||'',action:`switchTab('booked',document.querySelectorAll('.nav-tab')[5]);`,tag:'booked'});
        } else {
          hits.push({label:`<strong>Checklist</strong> · ${group}`,text:item.task||'',action:`switchTab('checklist',document.querySelectorAll('.nav-tab')[6]);`,tag:'checklist'});
        }
      }
    });
  });
  if(!hits.length){out.innerHTML='<span style="color:var(--muted)">No results for <em>'+q.replace(/</g,'&lt;')+'</em></span>';return;}
  const tagColour={itinerary:'var(--jade)',checklist:'var(--gold)',booked:'var(--blossom)',idea:'var(--muted)'};
  out.innerHTML=`<div style="color:var(--muted);margin-bottom:8px;">${hits.length} result${hits.length===1?'':'s'}</div>`+
    hits.map(h=>`<div onclick="${h.action}" style="background:var(--ink2);border:1px solid var(--border);border-radius:10px;padding:10px 12px;margin-bottom:8px;${h.action?'cursor:pointer;':''}" >
      <div style="display:flex;align-items:center;gap:6px;margin-bottom:4px;">
        <span style="font-size:10px;padding:2px 7px;border-radius:8px;background:${tagColour[h.tag]||'var(--muted)'};color:var(--ink);font-weight:700;">${h.tag}</span>
        <span style="font-size:11px;color:var(--muted);">${h.label}</span>
      </div>
      <div style="font-size:13px;color:var(--white);line-height:1.5;">${h.text}</div>
      ${h.action?'<div style="font-size:10px;color:var(--jade);margin-top:4px;">Tap to jump →</div>':''}
    </div>`).join('');
}
function switchTab(tab,btn){
  TABS.forEach(t=>{const el=document.getElementById('tab-'+t);if(el)el.style.display=(t===tab)?'block':'none';});
  document.querySelectorAll('.nav-tab').forEach(b=>b.classList.remove('active'));
  if(btn) btn.classList.add('active');
  if(tab==='booked') renderBooked();
  if(tab==='search') renderSearch();
}
/* ═══════════════════════════════════════════
   SERVICE WORKER (offline cache)
═══════════════════════════════════════════ */
if('serviceWorker' in navigator){
  const SW_CODE=`
const CACHE='japan-trip-v6';
const ASSETS=['${location.href}'];
self.addEventListener('install',e=>{
  e.waitUntil(caches.open(CACHE).then(c=>c.addAll(ASSETS)));
  self.skipWaiting();
});
self.addEventListener('activate',e=>{
  e.waitUntil(caches.keys().then(keys=>Promise.all(keys.filter(k=>k!==CACHE).map(k=>caches.delete(k)))));
  self.clients.claim();
});
self.addEventListener('fetch',e=>{
  if(e.request.url.includes('.json')){
    e.respondWith(fetch(e.request));
    return;
  }
  e.respondWith(
    fetch(e.request).then(r=>{
      if(r&&r.status===200){
        const clone=r.clone();
        caches.open(CACHE).then(c=>c.put(e.request,clone));
      }
      return r;
    }).catch(()=>caches.match(e.request))
  );
});`;
  const blob=new Blob([SW_CODE],{type:'application/javascript'});
  const swUrl=URL.createObjectURL(blob);
  navigator.serviceWorker.register(swUrl).catch(()=>{});
}
