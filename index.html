<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🇯🇵 Japan Trip 2026 — Evans Family</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@300;400;600;700&family=DM+Sans:wght@300;400;500;600&display=swap');

:root {
  --ink: #0f0f1a; --ink2: #1a1a2e;
  --blossom: #e8829a; --gold: #c9a84c;
  --jade: #4a9e8e; --white: #fdfbf7;
  --muted: #8888a0; --border: rgba(255,255,255,0.08);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'DM Sans', sans-serif; background: var(--ink); color: var(--white); min-height: 100vh; }

/* HEADER */
.header {
  background: linear-gradient(160deg, #0f0f1a 0%, #1a1a2e 50%, #0f1520 100%);
  padding: 24px 20px 16px; text-align: center;
  border-bottom: 1px solid rgba(232,130,154,0.2);
  position: relative; overflow: hidden;
}
.header::before {
  content: ''; position: absolute; inset: 0;
  background: radial-gradient(ellipse at 50% 0%, rgba(232,130,154,0.08) 0%, transparent 70%);
  pointer-events: none;
}
.header-jp { font-family: 'Noto Serif JP', serif; font-size: 11px; color: var(--blossom); letter-spacing: 6px; margin-bottom: 6px; opacity: 0.8; }
.header h1 { font-family: 'Noto Serif JP', serif; font-size: clamp(20px, 5vw, 28px); font-weight: 600; color: var(--white); line-height: 1.2; }
.header-dates { font-size: 13px; color: var(--gold); margin-top: 6px; letter-spacing: 1px; font-weight: 500; }
.family-row { display: flex; justify-content: center; gap: 8px; margin-top: 10px; flex-wrap: wrap; }
.family-pill { background: rgba(232,130,154,0.12); border: 1px solid rgba(232,130,154,0.25); color: var(--blossom); font-size: 11px; padding: 3px 10px; border-radius: 20px; font-weight: 500; }

/* COUNTDOWN */
.countdown-bar {
  display: flex; justify-content: center; gap: 16px;
  margin-top: 14px; flex-wrap: wrap;
}
.countdown-unit {
  text-align: center;
  background: rgba(232,130,154,0.08);
  border: 1px solid rgba(232,130,154,0.2);
  border-radius: 12px; padding: 8px 14px; min-width: 60px;
}
.countdown-num { font-family: 'Noto Serif JP', serif; font-size: 24px; font-weight: 700; color: var(--blossom); line-height: 1; }
.countdown-lbl { font-size: 10px; color: var(--muted); margin-top: 3px; letter-spacing: 0.5px; text-transform: uppercase; }
.countdown-gone { font-size: 12px; color: var(--jade); font-weight: 600; margin-top: 12px; letter-spacing: 0.5px; }

.sync-bar { display: flex; align-items: center; justify-content: center; gap: 8px; margin-top: 12px; font-size: 11px; color: var(--muted); }
.sync-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--jade); flex-shrink: 0; }
.sync-dot.loading { background: var(--gold); animation: pulse 1s infinite; }
.sync-dot.error { background: #e05050; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
.refresh-btn { background: none; border: 1px solid rgba(255,255,255,0.15); color: var(--muted); font-size: 11px; padding: 3px 10px; border-radius: 12px; cursor: pointer; font-family: inherit; transition: all 0.2s; }
.refresh-btn:hover { border-color: var(--blossom); color: var(--blossom); }

/* NAV */
.nav-tabs { display: flex; background: var(--ink2); border-bottom: 1px solid var(--border); overflow-x: auto; scrollbar-width: none; }
.nav-tabs::-webkit-scrollbar { display: none; }
.nav-tab { flex-shrink: 0; padding: 12px 15px; font-size: 12px; font-weight: 500; color: var(--muted); cursor: pointer; border-bottom: 2px solid transparent; transition: all 0.2s; white-space: nowrap; font-family: inherit; background: none; border-top: none; border-left: none; border-right: none; }
.nav-tab:hover { color: var(--white); }
.nav-tab.active { color: var(--blossom); border-bottom-color: var(--blossom); }

.content { max-width: 760px; margin: 0 auto; padding: 0 16px 60px; }

/* OVERVIEW */
.overview-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; padding: 20px 0 8px; }
.stat-card { background: rgba(255,255,255,0.04); border: 1px solid var(--border); border-radius: 12px; padding: 14px 12px; text-align: center; }
.stat-num { font-family: 'Noto Serif JP', serif; font-size: 26px; font-weight: 600; color: var(--blossom); line-height: 1; }
.stat-label { font-size: 11px; color: var(--muted); margin-top: 4px; }
.route-strip { display: flex; align-items: center; gap: 8px; padding: 14px 16px; margin: 12px 0; background: rgba(255,255,255,0.03); border: 1px solid var(--border); border-radius: 12px; overflow-x: auto; scrollbar-width: none; }
.route-strip::-webkit-scrollbar { display: none; }
.route-city { flex-shrink: 0; font-size: 12px; font-weight: 600; }
.route-arrow { flex-shrink: 0; color: var(--blossom); font-size: 14px; }
.hotel-list { padding: 8px 0; }
.hotel-card { display: flex; align-items: center; gap: 14px; padding: 14px 16px; margin-bottom: 8px; background: rgba(255,255,255,0.03); border: 1px solid var(--border); border-radius: 12px; }
.hotel-icon { font-size: 22px; flex-shrink: 0; }
.hotel-name { font-size: 14px; font-weight: 500; }
.hotel-dates { font-size: 11px; color: var(--muted); margin-top: 2px; }
.hotel-status { margin-left: auto; font-size: 10px; font-weight: 600; padding: 3px 9px; border-radius: 10px; flex-shrink: 0; }
.hotel-status.paid { background: rgba(74,158,142,0.2); color: var(--jade); border: 1px solid rgba(74,158,142,0.3); }
.hotel-status.property { background: rgba(201,168,76,0.2); color: var(--gold); border: 1px solid rgba(201,168,76,0.3); }

/* WEATHER */
.weather-container { padding-top: 12px; }
.weather-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
@media(min-width:500px){ .weather-grid { grid-template-columns: repeat(3, 1fr); } }
.weather-card {
  background: rgba(255,255,255,0.03); border: 1px solid var(--border);
  border-radius: 14px; padding: 16px 14px; text-align: center;
}
.weather-city { font-size: 13px; font-weight: 600; margin-bottom: 4px; }
.weather-dates { font-size: 10px; color: var(--muted); margin-bottom: 10px; }
.weather-icon { font-size: 32px; margin-bottom: 6px; }
.weather-temp { font-family: 'Noto Serif JP', serif; font-size: 22px; font-weight: 600; color: var(--blossom); }
.weather-range { font-size: 11px; color: var(--muted); margin-top: 2px; }
.weather-desc { font-size: 11px; color: var(--gold); margin-top: 6px; font-weight: 500; }
.weather-detail { font-size: 10px; color: var(--muted); margin-top: 8px; line-height: 1.6; }
.weather-note { font-size: 11px; color: var(--muted); padding: 12px 0 4px; text-align: center; font-style: italic; }
.section-title { font-size: 11px; color: var(--gold); font-weight: 600; letter-spacing: 0.5px; text-transform: uppercase; padding: 14px 0 8px; }

/* MAP */
.map-container { padding-top: 12px; }
.map-iframe { width: 100%; height: 420px; border: none; border-radius: 14px; border: 1px solid var(--border); }
.map-city-tabs { display: flex; gap: 8px; overflow-x: auto; scrollbar-width: none; padding: 12px 0 8px; }
.map-city-tabs::-webkit-scrollbar { display: none; }
.map-city-btn {
  flex-shrink: 0; padding: 6px 14px; font-size: 12px; font-weight: 500;
  background: rgba(255,255,255,0.05); border: 1px solid var(--border);
  color: var(--muted); border-radius: 20px; cursor: pointer;
  font-family: inherit; transition: all 0.2s; white-space: nowrap;
}
.map-city-btn:hover { color: var(--white); border-color: rgba(255,255,255,0.2); }
.map-city-btn.active { background: rgba(232,130,154,0.15); border-color: rgba(232,130,154,0.4); color: var(--blossom); }
.map-legend { display: flex; flex-wrap: wrap; gap: 10px; padding: 10px 0 4px; }
.map-legend-item { display: flex; align-items: center; gap: 6px; font-size: 11px; color: var(--muted); }
.map-legend-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }

/* DAYS */
.days-container { padding-top: 12px; }
.day-card { margin-bottom: 8px; border: 1px solid var(--border); border-radius: 14px; overflow: hidden; background: rgba(255,255,255,0.02); }
.day-header { display: flex; align-items: center; gap: 12px; padding: 14px 16px; cursor: pointer; transition: background 0.2s; user-select: none; }
.day-header:hover { background: rgba(255,255,255,0.04); }
.day-num { font-family: 'Noto Serif JP', serif; font-size: 22px; font-weight: 700; color: var(--blossom); line-height: 1; min-width: 30px; }
.day-info { flex: 1; min-width: 0; }
.day-title { font-size: 14px; font-weight: 600; }
.day-loc { font-size: 11px; color: var(--muted); margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.day-badge { font-size: 10px; padding: 3px 8px; border-radius: 10px; font-weight: 600; flex-shrink: 0; background: rgba(201,168,76,0.15); color: var(--gold); border: 1px solid rgba(201,168,76,0.25); }
.day-chevron { color: var(--muted); font-size: 14px; transition: transform 0.25s; flex-shrink: 0; }
.day-card.open .day-chevron { transform: rotate(90deg); }
.day-body { display: none; padding: 0 16px 14px; }
.day-card.open .day-body { display: block; }
.day-map-btn {
  display: inline-flex; align-items: center; gap: 6px;
  font-size: 11px; color: var(--blossom); background: rgba(232,130,154,0.1);
  border: 1px solid rgba(232,130,154,0.25); border-radius: 20px;
  padding: 5px 12px; cursor: pointer; margin: 8px 0 4px;
  font-family: inherit; transition: all 0.2s;
}
.day-map-btn:hover { background: rgba(232,130,154,0.2); }
.day-map-frame { width: 100%; height: 280px; border: none; border-radius: 12px; border: 1px solid var(--border); margin: 8px 0; display: none; }
.day-map-frame.visible { display: block; }

.item { display: grid; grid-template-columns: 52px 1fr auto; gap: 10px; padding: 10px 0; border-top: 1px solid rgba(255,255,255,0.05); align-items: start; }
.item-time { font-size: 11px; color: var(--muted); font-weight: 500; padding-top: 2px; text-align: right; line-height: 1.3; }
.item-main { min-width: 0; }
.item-activity { font-size: 13px; font-weight: 500; line-height: 1.4; }
.item-notes { font-size: 11px; color: var(--muted); margin-top: 4px; line-height: 1.5; }
.item-map { font-size: 10px; color: var(--blossom); text-decoration: none; padding-top: 2px; flex-shrink: 0; opacity: 0.7; transition: opacity 0.2s; white-space: nowrap; }
.item-map:hover { opacity: 1; }
.status-badge { font-size: 9px; font-weight: 700; padding: 2px 7px; border-radius: 8px; letter-spacing: 0.5px; margin-top: 5px; display: inline-block; text-transform: uppercase; }
.s-booked { background: rgba(224,80,80,0.2); color: #e05050; border: 1px solid rgba(224,80,80,0.3); }
.s-confirmed { background: rgba(74,158,142,0.2); color: var(--jade); border: 1px solid rgba(74,158,142,0.3); }
.s-included { background: rgba(74,142,201,0.2); color: #4a8ec9; border: 1px solid rgba(74,142,201,0.3); }
.s-planning { background: rgba(201,168,76,0.2); color: var(--gold); border: 1px solid rgba(201,168,76,0.3); }
.s-optional { background: rgba(158,110,201,0.2); color: #9e6ec9; border: 1px solid rgba(158,110,201,0.3); }
.s-free { background: rgba(122,184,122,0.2); color: #7ab87a; border: 1px solid rgba(122,184,122,0.3); }

/* CHECKLIST */
.checklist-container { padding-top: 12px; }
.checklist-group { margin-bottom: 16px; }
.checklist-group-title { font-size: 12px; font-weight: 600; color: var(--gold); letter-spacing: 0.5px; padding: 10px 0 8px; text-transform: uppercase; }
.checklist-item { display: flex; align-items: flex-start; gap: 12px; padding: 10px 14px; margin-bottom: 6px; background: rgba(255,255,255,0.03); border: 1px solid var(--border); border-radius: 10px; cursor: pointer; transition: all 0.2s; }
.checklist-item:hover { background: rgba(255,255,255,0.05); }
.checklist-item.checked { opacity: 0.45; background: rgba(74,158,142,0.05); border-color: rgba(74,158,142,0.2); }
.checkbox { width: 18px; height: 18px; border-radius: 5px; border: 2px solid rgba(255,255,255,0.2); flex-shrink: 0; margin-top: 1px; display: flex; align-items: center; justify-content: center; transition: all 0.2s; }
.checklist-item.checked .checkbox { background: var(--jade); border-color: var(--jade); }
.checkbox-tick { color: white; font-size: 11px; display: none; }
.checklist-item.checked .checkbox-tick { display: block; }
.check-task { font-size: 13px; font-weight: 500; flex: 1; }
.check-meta { font-size: 11px; color: var(--muted); margin-top: 2px; }
.check-who { font-size: 10px; padding: 2px 8px; border-radius: 8px; font-weight: 600; flex-shrink: 0; margin-top: 2px; background: rgba(232,130,154,0.15); color: var(--blossom); border: 1px solid rgba(232,130,154,0.25); }
.progress-track { background: rgba(255,255,255,0.08); border-radius: 4px; height: 5px; margin: 6px 0 12px; overflow: hidden; }
.progress-fill { height: 100%; border-radius: 4px; background: linear-gradient(90deg, var(--jade), var(--blossom)); transition: width 0.4s ease; }
.progress-label { font-size: 11px; color: var(--muted); margin-bottom: 8px; }

/* PHRASES */
.phrases-container { padding-top: 12px; }
.phrase-card { display: flex; align-items: center; gap: 14px; padding: 12px 16px; margin-bottom: 8px; background: rgba(255,255,255,0.03); border: 1px solid var(--border); border-radius: 12px; }
.phrase-jp { font-family: 'Noto Serif JP', serif; font-size: 18px; min-width: 110px; }
.phrase-en { font-size: 13px; font-weight: 500; }
.phrase-rom { font-size: 11px; color: var(--blossom); margin-top: 2px; font-style: italic; }

/* TIPS */
.tips-container { padding-top: 12px; }
.tip-section { margin-bottom: 20px; }
.tip-section-title { font-size: 12px; font-weight: 600; color: var(--gold); letter-spacing: 0.5px; text-transform: uppercase; padding: 10px 0 8px; }
.tip-item { padding: 10px 14px; margin-bottom: 6px; background: rgba(255,255,255,0.03); border: 1px solid var(--border); border-radius: 10px; font-size: 13px; line-height: 1.5; }
.tip-item strong { color: var(--blossom); }
</style>
</head>
<body>

<div class="header">
  <div class="header-jp">日本家族旅行</div>
  <h1>🇯🇵 Japan Family Trip 2026</h1>
  <div class="header-dates">Fri 3 Apr – Sat 18 Apr 2026</div>
  <div class="family-row">
    <span class="family-pill">Andy</span>
    <span class="family-pill">Sarah</span>
    <span class="family-pill">Jack</span>
    <span class="family-pill">Charlie</span>
  </div>
  <div class="countdown-bar" id="countdown-bar"></div>
  <div class="sync-bar">
    <div class="sync-dot loading" id="sync-dot"></div>
    <span id="sync-status">Loading trip data…</span>
    <button class="refresh-btn" onclick="loadData()">↻ Refresh</button>
  </div>
</div>

<div class="nav-tabs">
  <button class="nav-tab active" onclick="switchTab('overview',this)">Overview</button>
  <button class="nav-tab" onclick="switchTab('days',this)">Day by Day</button>
  <button class="nav-tab" onclick="switchTab('map',this)">🗺 Map</button>
  <button class="nav-tab" onclick="switchTab('weather',this)">🌤 Weather</button>
  <button class="nav-tab" onclick="switchTab('checklist',this)">Checklist</button>
  <button class="nav-tab" onclick="switchTab('phrases',this)">Japanese</button>
  <button class="nav-tab" onclick="switchTab('tips',this)">Tips</button>
</div>

<div class="content">
  <div id="tab-overview"></div>
  <div id="tab-days" style="display:none"></div>
  <div id="tab-map" style="display:none"></div>
  <div id="tab-weather" style="display:none"></div>
  <div id="tab-checklist" style="display:none"></div>
  <div id="tab-phrases" style="display:none"></div>
  <div id="tab-tips" style="display:none"></div>
</div>

<script>
const RAW_URL = 'https://raw.githubusercontent.com/digitalandyuk/Japan-Trip0326/main/japan-trip.json';
let tripData = null;
let checklistState = {};

const STATUS_MAP = {
  booked:{cls:'s-booked',label:'Booked'}, confirmed:{cls:'s-confirmed',label:'Confirmed'},
  included:{cls:'s-included',label:'Included'}, planning:{cls:'s-planning',label:'Planning'},
  optional:{cls:'s-optional',label:'Optional'}, free:{cls:'s-free',label:'Free'},
  paid:{cls:'s-confirmed',label:'Paid'}, on_arrival:{cls:'s-planning',label:'On Arrival'},
  reminder:{cls:'s-optional',label:'Reminder'}, incomplete:{cls:'s-booked',label:'Incomplete'},
  pay_at_property:{cls:'s-planning',label:'Pay on Arrival'},
};

/* ===== COUNTDOWN ===== */
function renderCountdown() {
  const departure = new Date('2026-04-03T00:00:00');
  const now = new Date();
  const diff = departure - now;
  const bar = document.getElementById('countdown-bar');
  if (diff <= 0) {
    bar.innerHTML = '<div class="countdown-gone">✈️ Trip is underway — enjoy Japan!</div>';
    return;
  }
  const d = Math.floor(diff / 86400000);
  const h = Math.floor((diff % 86400000) / 3600000);
  const m = Math.floor((diff % 3600000) / 60000);
  const s = Math.floor((diff % 60000) / 1000);
  bar.innerHTML = `
    <div class="countdown-unit"><div class="countdown-num">${d}</div><div class="countdown-lbl">Days</div></div>
    <div class="countdown-unit"><div class="countdown-num">${String(h).padStart(2,'0')}</div><div class="countdown-lbl">Hours</div></div>
    <div class="countdown-unit"><div class="countdown-num">${String(m).padStart(2,'0')}</div><div class="countdown-lbl">Mins</div></div>
    <div class="countdown-unit"><div class="countdown-num">${String(s).padStart(2,'0')}</div><div class="countdown-lbl">Secs</div></div>`;
}
renderCountdown();
setInterval(renderCountdown, 1000);

/* ===== SYNC ===== */
function setSyncStatus(state, msg) {
  const dot = document.getElementById('sync-dot');
  const txt = document.getElementById('sync-status');
  dot.className = 'sync-dot' + (state==='loading'?' loading':state==='error'?' error':'');
  txt.textContent = msg;
}

async function loadData() {
  setSyncStatus('loading','Fetching latest data…');
  try {
    const res = await fetch(RAW_URL + '?t=' + Date.now());
    if (!res.ok) throw new Error('HTTP ' + res.status);
    tripData = await res.json();
    setSyncStatus('ok','Updated ' + new Date().toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'}));
  } catch(e) {
    setSyncStatus('error','Could not fetch — showing built-in data');
    tripData = { days: [], checklist: [] };
  }
  renderAll();
}

function renderAll() {
  renderOverview();
  renderDays();
  renderChecklist();
}

/* ===== OVERVIEW ===== */
function renderOverview() {
  const days = (tripData.days||[]);
  const totalItems = days.reduce((a,d)=>a+(d.items||[]).length,0);
  const hotels = [
    {name:'Crown Park Hotel Seoul',       dates:'Sat 4 – Sun 5 Apr',   status:'paid'},
    {name:'Keio Plaza Hotel Tokyo',        dates:'Sun 5 – Wed 8 Apr',   status:'property'},
    {name:'TEN-YU Ryokan, Hakone',         dates:'Wed 8 – Fri 10 Apr',  status:'paid'},
    {name:'Mitsui Garden Hotel Kyoto',     dates:'Fri 10 – Tue 14 Apr', status:'paid'},
    {name:'Candeo Hotels Osaka The Tower', dates:'Tue 14 – Fri 17 Apr', status:'paid'},
    {name:'Grand Hyatt Incheon',           dates:'Fri 17 – Sat 18 Apr', status:'property'},
  ];
  const icons = ['🏨','🏙️','🛁','🌸','🎡','✈️'];
  document.getElementById('tab-overview').innerHTML = `
    <div class="overview-grid">
      <div class="stat-card"><div class="stat-num">15</div><div class="stat-label">Days</div></div>
      <div class="stat-card"><div class="stat-num">4</div><div class="stat-label">Cities</div></div>
      <div class="stat-card"><div class="stat-num">${totalItems||'60+'}</div><div class="stat-label">Activities</div></div>
    </div>
    <div class="route-strip">
      <span class="route-city">🇬🇧 London</span><span class="route-arrow">→</span>
      <span class="route-city">🇰🇷 Seoul</span><span class="route-arrow">→</span>
      <span class="route-city">🗼 Tokyo</span><span class="route-arrow">→</span>
      <span class="route-city">⛰️ Hakone</span><span class="route-arrow">→</span>
      <span class="route-city">⛩️ Kyoto</span><span class="route-arrow">→</span>
      <span class="route-city">🏯 Nara</span><span class="route-arrow">→</span>
      <span class="route-city">🦞 Osaka</span><span class="route-arrow">→</span>
      <span class="route-city">🇬🇧 London</span>
    </div>
    <div class="section-title">Accommodation</div>
    <div class="hotel-list">
      ${hotels.map((h,i)=>`<div class="hotel-card">
        <div class="hotel-icon">${icons[i]}</div>
        <div><div class="hotel-name">${h.name}</div><div class="hotel-dates">${h.dates}</div></div>
        <div class="hotel-status ${h.status==='paid'?'paid':'property'}">${h.status==='paid'?'Paid':'Pay on Arrival'}</div>
      </div>`).join('')}
    </div>`;
}

/* ===== MAP TAB ===== */

function getMapForDay(location) {
  if (!location) return null;
  const loc = location;
  for (const key of Object.keys(DAY_MAPS)) {
    if (loc.includes(key)) return { url: DAY_MAPS[key], city: key };
  }
  return null;
}

function renderDays() {
  const days = tripData.days || [];
  const container = document.getElementById('tab-days');
  container.innerHTML = '<div class="days-container">' + days.map((day,di) => {
    const items = day.items || [];
    const label = day.label || '';
    const dayNum = label.match(/Day (\d+)/)?.[1] || (di+1);
    const mapInfo = getMapForDay(day.location || '');

    const itemsHTML = items.map(item => {
      const sm = STATUS_MAP[item.status] || {cls:'s-planning',label:item.status||''};
      const mapLink = item.mapQuery
        ? `<a class="item-map" href="https://maps.google.com/?q=${encodeURIComponent(item.mapQuery)}" target="_blank">📍 Map</a>` : '';
      return `<div class="item">
        <div class="item-time">${item.time||''}</div>
        <div class="item-main">
          <div class="item-activity">${item.activity||''}</div>
          ${item.notes?`<div class="item-notes">${item.notes}</div>`:''}
          <span class="status-badge ${sm.cls}">${sm.label}</span>
        </div>
        ${mapLink}
      </div>`;
    }).join('');

    const mapBtn = mapInfo
      ? `<button class="day-map-btn" onclick="toggleDayMap(${di})">🗺 Show ${mapInfo.city} map</button>
         <iframe id="day-map-${di}" class="day-map-frame" src="" data-src="${mapInfo.url}" allowfullscreen loading="lazy" referrerpolicy="no-referrer-when-downgrade"></iframe>`
      : '';

    return `<div class="day-card" id="day-${di}">
      <div class="day-header" onclick="toggleDay(${di})">
        <div class="day-num">${dayNum}</div>
        <div class="day-info">
          <div class="day-title">${formatDayDate(day.date)}</div>
          <div class="day-loc">${day.location||''}</div>
        </div>
        <div class="day-badge">${items.length} activities</div>
        <div class="day-chevron">›</div>
      </div>
      <div class="day-body">
        ${mapBtn}
        ${itemsHTML}
      </div>
    </div>`;
  }).join('') + '</div>';
}

function toggleDay(idx) {
  document.getElementById('day-'+idx).classList.toggle('open');
}

function toggleDayMap(idx) {
  const frame = document.getElementById('day-map-'+idx);
  const btn = frame.previousElementSibling;
  const isVisible = frame.classList.contains('visible');
  if (!isVisible) {
    frame.src = frame.dataset.src;
    frame.classList.add('visible');
    btn.textContent = btn.textContent.replace('Show','Hide');
  } else {
    frame.classList.remove('visible');
    btn.textContent = btn.textContent.replace('Hide','Show');
  }
}

function formatDayDate(dateStr) {
  if (!dateStr) return '';
  try {
    return new Date(dateStr+'T12:00:00').toLocaleDateString('en-GB',{weekday:'long',day:'numeric',month:'short'});
  } catch(e) { return dateStr; }
}

/* ===== CHECKLIST ===== */
function renderChecklist() {
  const groups = tripData.checklist || [];
  try { checklistState = JSON.parse(sessionStorage.getItem('japan-checklist')||'{}'); } catch(e){}
  let total=0, done=0;
  groups.forEach((g,gi)=>(g.items||[]).forEach((_,ii)=>{ total++; if(checklistState[`${gi}-${ii}`]) done++; }));
  const groupsHTML = groups.map((g,gi)=>`
    <div class="checklist-group">
      <div class="checklist-group-title">${g.group||''}</div>
      ${(g.items||[]).map((item,ii)=>{
        const key=`${gi}-${ii}`, checked=!!checklistState[key];
        return `<div class="checklist-item${checked?' checked':''}" onclick="toggleCheck('${key}',this)">
          <div class="checkbox"><span class="checkbox-tick">✓</span></div>
          <div style="flex:1;min-width:0">
            <div class="check-task">${item.task||''}</div>
            ${item.notes?`<div class="check-meta">${item.notes}</div>`:''}
            ${item.deadline&&item.deadline!=='✅ Done'?`<div class="check-meta" style="color:var(--blossom)">⏰ ${item.deadline}</div>`:''}
          </div>
          ${item.who?`<div class="check-who">${item.who}</div>`:''}
        </div>`;
      }).join('')}
    </div>`).join('');
  document.getElementById('tab-checklist').innerHTML = `
    <div class="checklist-container">
      <div class="progress-label">${done} of ${total} complete</div>
      <div class="progress-track"><div class="progress-fill" id="prog-fill" style="width:${total?Math.round(done/total*100):0}%"></div></div>
      ${groupsHTML}
    </div>`;
}

function toggleCheck(key, el) {
  checklistState[key] = !checklistState[key];
  try { sessionStorage.setItem('japan-checklist', JSON.stringify(checklistState)); } catch(e){}
  el.classList.toggle('checked');
  const total = document.querySelectorAll('.checklist-item').length;
  const done = document.querySelectorAll('.checklist-item.checked').length;
  const fill = document.getElementById('prog-fill');
  if (fill) fill.style.width = (total?Math.round(done/total*100):0)+'%';
  const lbl = document.querySelector('.progress-label');
  if (lbl) lbl.textContent = `${done} of ${total} complete`;
}
